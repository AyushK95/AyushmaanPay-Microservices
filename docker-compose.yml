services:

  registry:
    build: ./service-registry
    ports:
      - "8761:8761"

  config:
    build: ./config-server
    ports:
      - "8888:8888"

    depends_on:
      - registry

  wallet:
    build: ./wallet-service

    ports:
      - "8081:8080"

    depends_on:
      - config
      - registry

  transaction:
    build: ./transaction-service

    ports:
      - "8082:8080"

    depends_on:
      - config
      - registry

  gateway:
    build: ./api-gateway

    ports:
      - "8080:8080"

    depends_on:
      - registry
      - config
      - wallet
      - transaction