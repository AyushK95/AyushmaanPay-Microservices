services:

  registry:
    build:
      context: ./service-registry

    ports:
      - "8761:8761"

  config:
    build:
      context: ./config-server

    ports:
      - "8888:8888"

    depends_on:
      - registry

  gateway:
    build:
      context: ./api-gateway

    ports:
      - "8080:8080"

    depends_on:
      - registry
      - config

  wallet:
    build:
      context: ./wallet-service

    ports:
      - "8082:8082"

    depends_on:
      - registry

  transaction:
    build:
      context: ./transaction-service

    ports:
      - "8083:8083"

    depends_on:
      - registry
      - wallet