services:

  registry:
    build: ./service-registry
    ports:
      - "8761:8761"

  config:
    build: ./config-server
    ports:
      - "8888:8888"

    depends_on:
      registry:
        condition: service_started

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8888/actuator/health"]
      interval: 15s
      timeout: 10s
      retries: 20
      start_period: 60s

  wallet:
    build: ./wallet-service
    ports:
      - "8081:8080"

    depends_on:
      config:
        condition: service_healthy

  transaction:
    build: ./transaction-service
    ports:
      - "8082:8080"

    depends_on:
      config:
        condition: service_healthy

  gateway:
    build: ./api-gateway
    ports:
      - "8080:8080"

    depends_on:
      config:
        condition: service_healthy
      wallet:
        condition: service_started
      transaction:
        condition: service_started
