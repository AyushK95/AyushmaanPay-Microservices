spring.application.name=transaction-service

spring.config.import=optional:configserver:http://config:8888
spring.cloud.config.uri=http://config:8888

spring.cloud.config.fail-fast=false

spring.cloud.config.retry.initial-interval=2000
spring.cloud.config.retry.max-attempts=10

resilience4j.circuitbreaker.instances.wallet.register-health-indicator=true

resilience4j.circuitbreaker.instances.wallet.failure-rate-threshold=50

resilience4j.circuitbreaker.instances.wallet.sliding-window-size=10

resilience4j.circuitbreaker.instances.wallet.wait-duration-in-open-state=10s

resilience4j.retry.instances.wallet.max-attempts=3

resilience4j.retry.instances.wallet.wait-duration=2s

logging.level.io.github.resilience4j=DEBUG

management.tracing.sampling.probability=1.0
management.zipkin.tracing.endpoint=http://localhost:9411/api/v2/spans

logging.pattern.level=%5p [${spring.application.name:},%X{traceId},%X{spanId}]
